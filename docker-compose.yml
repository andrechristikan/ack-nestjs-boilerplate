name: ack-nestjs-boilerplate

services:
    apis:
        build:
            context: .
            dockerfile: ci/dockerfile.local
        hostname: apis
        ports:
            - 3000:3000
        volumes:
            - ./:/app/
        restart: on-failure
        networks:
            - app-network
        depends_on:
            redis:
                condition: service_healthy
            mongo:
                condition: service_healthy
            jwks-server:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--no-verbose",
                    "--tries=1",
                    "--spider",
                    "http://localhost:3000/api/hello",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
        profiles: ["apis"]
        deploy:
            resources:
                limits:
                    cpus: "1"
                    memory: 2G

    jwks-server:
        image: nginx:alpine
        hostname: jwks-server
        ports:
            - "3011:80"
        volumes:
            - ./keys/access-jwks.json:/usr/share/nginx/html/.well-known/access-jwks.json:ro
            - ./keys/refresh-jwks.json:/usr/share/nginx/html/.well-known/refresh-jwks.json:ro
            - ./ci/jwks-server/jwks.conf:/etc/nginx/conf.d/default.conf:ro
        networks:
            - app-network
        deploy:
            resources:
                limits:
                    cpus: "0.3"
                    memory: 128M
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--no-verbose",
                    "--tries=1",
                    "--spider",
                    "http://localhost:80/.well-known/access-jwks.json",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s

    vault:
        image: hashicorp/vault:latest
        hostname: vault
        profiles: ["vault"]
        cap_add:
            - IPC_LOCK
        ports:
            - "8200:8200"
        entrypoint: ["/bin/sh", "/vault/entrypoint.sh"]
        volumes:
            - ./ci/vault/entrypoint.sh:/vault/entrypoint.sh:ro
            - ./ci/vault/config.hcl:/vault/config.hcl:ro
            - vault_data:/vault/file
            - ./generated/vault:/vault/init
        networks:
            vault-network:
                aliases:
                    - vault
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -q -O- 'http://127.0.0.1:8200/v1/sys/health?standbycode=200' >/dev/null 2>&1 || exit 1",
                ]
            interval: 5s
            timeout: 3s
            retries: 15
            start_period: 5s

    vault-bootstrap:
        image: hashicorp/vault:latest
        profiles: ["vault"]
        entrypoint: ["/bin/sh", "/bootstrap.sh"]
        environment:
            VAULT_ADDR: http://vault:8200
            KV_MOUNT: ack-nestjs-boilerplate
        volumes:
            - ./ci/vault/bootstrap.sh:/bootstrap.sh:ro
            - ./ci/vault/policies:/policies:ro
            - ./.env.example:/seed/.env.example:ro
            - ./generated/vault:/vault/init
        networks:
            - vault-network
        depends_on:
            vault:
                condition: service_healthy

    redis:
        image: redis:latest
        hostname: redis
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        networks:
            - app-network
        deploy:
            resources:
                limits:
                    cpus: "0.5"
                    memory: 256M
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 30s
            retries: 5

    redis-bullboard:
        image: venatum/bull-board:latest
        hostname: redis-bullboard
        ports:
            - 3010:3000
        networks:
            - app-network
        environment:
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - BULL_PREFIX=Queue
            - USER_LOGIN=admin
            - USER_PASSWORD=admin123
            - REDIS_DB=1
        depends_on:
            redis:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    cpus: "0.3"
                    memory: 128M

    mongo:
        image: mongo:latest
        hostname: mongo
        ports:
            - "27017:27017"
        networks:
            - app-network
        volumes:
            - mongo_data:/data/db
        command: mongod --bind_ip_all --replSet rs0 --port 27017
        extra_hosts:
            - "host.docker.internal:host-gateway"
        deploy:
            resources:
                limits:
                    cpus: "1"
                    memory: 1GB
        healthcheck:
            test: mongosh --eval "db.adminCommand('ping')" --quiet
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    mongo-bootstrap:
        image: mongo:latest
        restart: "no"
        depends_on:
            mongo:
                condition: service_healthy
        networks:
            - app-network
        command: >
            bash -c "
            echo 'Waiting for MongoDB instance to be ready...' &&
            mongosh --host host.docker.internal:27017 --eval '
            config = {
                    \"_id\": \"rs0\",
                    \"members\": [
                    { \"_id\": 0, \"host\": \"host.docker.internal:27017\", \"priority\": 1 }
                ]
            };
            rs.initiate(config);
            rs.status();'&&
            echo 'Single-node replica set initialized successfully. Container will exit now.'
            "
        deploy:
            restart_policy:
                condition: none

volumes:
    mongo_data:
    redis_data:
    vault_data:

networks:
    app-network:
        driver: bridge
    vault-network:
        driver: bridge
