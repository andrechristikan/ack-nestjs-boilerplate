server {
    listen 80;
    server_name localhost;

    # Hide nginx version from Server header and error pages
    server_tokens off;

    root /usr/share/nginx/html;

    # JWKS endpoints (access + refresh) — public, cacheable, read-only.
    # Content-Type is set automatically from mime.types (.json -> application/json).
    location ~ ^/\.well-known/(?:access|refresh)-jwks\.json$ {
        limit_except GET {
            deny all;
        }

        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Methods 'GET' always;
        add_header Cache-Control 'public, max-age=3600' always;

        add_header X-Content-Type-Options 'nosniff' always;
        add_header X-Frame-Options 'DENY' always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
        add_header Referrer-Policy 'no-referrer' always;
    }

    # Health check endpoint
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # Redirect root to health
    location = / {
        return 301 /health;
    }

    # Deny everything else
    location / {
        return 404;
    }
}
